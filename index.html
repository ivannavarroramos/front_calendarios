<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#00505C" />
  <meta name="description" content="ATISA - Gestor Documental y Calendario" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Aleo:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=Lato:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
    rel="stylesheet">
  <title>ATISA — Gestor Documental/Calendario</title>
  <link rel="shortcut icon" href="/logo2_DEMOC.png" />
  <style>
    /* Splash screen inline para carga rápida */
    #splash-screen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #F0F4F7;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
    }

    #splash-screen .logo {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: #9CBA39;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      color: #fff;
      animation: pulse 1.5s ease-in-out infinite;
      font-family: sans-serif;
      font-weight: bold;
    }

    #splash-screen .text {
      font-family: 'Aleo', serif;
      font-weight: 700;
      font-size: 1.25rem;
      color: #00505C;
    }

    @keyframes pulse {

      0%,
      100% {
        transform: scale(1);
        opacity: 1;
      }

      50% {
        transform: scale(1.08);
        opacity: 0.7;
      }
    }
  </style>
</head>

<body>
  <noscript>Necesitas habilitar JavaScript para ejecutar esta aplicación.</noscript>

  <div id="root"></div>

  <!-- Splash Screen ATISA -->
  <div id="splash-screen">
    <div class="logo">A</div>
    <div class="text">Cargando...</div>
  </div>

  <div id="root-modals"></div>
  <script type="module" src="/src/main.tsx"></script>

  <!-- Ocultar splash cuando React monta -->
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      const observer = new MutationObserver(() => {
        const root = document.getElementById('root');
        if (root && root.children.length > 0) {
          const splash = document.getElementById('splash-screen');
          if (splash) splash.style.display = 'none';
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById('root'), { childList: true });
    });
  </script>
</body>

</html>
